name: Copilot CLI Spike (D-12)

# Throwaway spike — workflow_dispatch only; deleted after findings recorded.
on:
  workflow_dispatch:

jobs:
  spike:
    runs-on: ubuntu-latest
    steps:
      - name: Install Copilot CLI
        run: |
          START=$(date +%s)
          echo "Install start: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          npm install -g @github/copilot@1.0.60
          END=$(date +%s)
          echo "Install wall time: $((END - START))s"

      - name: Diagnostic — token prefix class and CLI version
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set +x
          if [ -z "${COPILOT_GITHUB_TOKEN}" ]; then
            echo "::error::COPILOT_GITHUB_TOKEN secret is not set"
            exit 1
          fi
          echo "COPILOT_GITHUB_TOKEN length: ${#COPILOT_GITHUB_TOKEN}"
          case "${COPILOT_GITHUB_TOKEN}" in
            github_pat_*) echo "COPILOT_GITHUB_TOKEN prefix class: github_pat_" ;;
            ghp_*)        echo "COPILOT_GITHUB_TOKEN prefix class: ghp_" ;;
            *)            echo "COPILOT_GITHUB_TOKEN prefix class: other" ;;
          esac
          copilot --version

      - name: Spike call — zero-tool prose
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          set +x
          echo "Spike call start: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          time copilot -p "Reply with exactly: PREVUE_SPIKE_OK" -s --no-ask-user
          echo "Spike call end: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
