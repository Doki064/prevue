name: Prevue Review

# Dogfood: pull_request attaches to PR; wait-ci gates on test-and-lint check_run.
# LIFE-04 resolveReviewThread requires contents:write — see prevue-review.yml / consumer-setup.md.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  checks: write

concurrency:
  group: prevue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wait-ci:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    outputs:
      ci_ok: ${{ steps.wait.outputs.ci_ok }}
    steps:
      - name: Wait for CI test-and-lint
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          while [ "$SECONDS" -lt "$deadline" ]; do
            runs=$(gh api "repos/${REPOSITORY}/commits/${HEAD_SHA}/check-runs?per_page=100" \
              --jq '[.check_runs[] | select(.name=="test-and-lint")]')
            count=$(printf '%s' "$runs" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "No test-and-lint check run yet; waiting..."
              sleep 15
              continue
            fi
            latest=$(printf '%s' "$runs" | jq 'sort_by(.started_at) | last')
            status=$(printf '%s' "$latest" | jq -r .status)
            conclusion=$(printf '%s' "$latest" | jq -r .conclusion)
            echo "test-and-lint: status=${status} conclusion=${conclusion}"
            if [ "$status" = "completed" ]; then
              case "$conclusion" in
                success)
                  echo "ci_ok=true" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                failure|cancelled|timed_out|action_required)
                  echo "CI test-and-lint did not pass; skipping Prevue review."
                  echo "ci_ok=false" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                *) sleep 15 ;;
              esac
            else
              sleep 15
            fi
          done
          echo "Timed out waiting for test-and-lint; skipping Prevue review." >&2
          echo "ci_ok=false" >> "$GITHUB_OUTPUT"

  review:
    needs: wait-ci
    if: >-
      needs.wait-ci.outputs.ci_ok == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft != true
    uses: ./.github/workflows/prevue-review.yml
    with:
      engine: ${{ vars.PREVUE_ENGINE || 'copilot-cli' }}
      prevue-ref: ${{ github.event.pull_request.head.sha }}
      pr-head-sha: ${{ github.event.pull_request.head.sha }}
      consumer-base-sha: ${{ github.event.pull_request.base.sha }}
      seed-consumer-config: true
    secrets:
      copilot-github-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
