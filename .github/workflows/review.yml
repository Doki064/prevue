name: Prevue Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: prevue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    uses: ./.github/workflows/prevue-review.yml
    with:
      engine: ${{ vars.PREVUE_ENGINE || 'copilot-cli' }}
      # Dogfood: PR-head framework for maintainer CI pre-release; consumers pin @vX.
      prevue-ref: ${{ github.event.pull_request.head.sha }}
    secrets:
      copilot-github-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
