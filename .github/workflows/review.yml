name: Prevue Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: prevue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted reviewer code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "0.11.21"

      - name: Install dependencies
        run: uv sync --locked

      - name: Install Copilot CLI
        run: npm install -g @github/copilot@1.0.61

      - name: Install Claude Code CLI
        run: curl -fsSL https://claude.ai/install.sh | bash

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          command -v cursor-agent

      - name: Resolve PREVUE_ENGINE
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ENGINE="${{ vars.PREVUE_ENGINE }}"
          if [ "${{ github.head_ref }}" = "uat/phase-05" ]; then
            ACTIVE=$(gh api "repos/${{ github.repository }}/contents/uat/phase-05/ACTIVE?ref=${{ github.head_ref }}" --jq .content 2>/dev/null | base64 -d | tr -d '\n' || true)
            if [ -n "$ACTIVE" ]; then
              ENGINE="$ACTIVE"
            fi
          fi
          echo "PREVUE_ENGINE=${ENGINE:-copilot-cli}" >> "$GITHUB_ENV"

      - name: Run review
        run: uv run prevue review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
