name: Prevue Review

# Dogfood: pull_request attaches to PR; wait-ci gates on pull_request CI workflow (ci.yml).
# LIFE-04 resolveReviewThread requires contents:write — see prevue-review.yml / consumer-setup.md.
on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

# Per-PR concurrency: cancel in-flight wait-ci/review on synchronize so only the
# latest head SHA is reviewed (intentional; not per-commit overlapping runs).
concurrency:
  group: prevue-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  wait-ci:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft != true
    permissions:
      actions: read
    runs-on: ubuntu-latest
    outputs:
      ci_ok: ${{ steps.wait.outputs.ci_ok }}
    steps:
      - name: Wait for pull_request CI workflow
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          deadline=$((SECONDS + 1800))
          while [ "$SECONDS" -lt "$deadline" ]; do
            run=$(gh run list \
              --repo "$REPOSITORY" \
              --workflow ci.yml \
              --commit "$HEAD_SHA" \
              --event pull_request \
              --limit 1 \
              --json status,conclusion,event)
            count=$(printf '%s' "$run" | jq 'length')
            if [ "$count" -eq 0 ]; then
              echo "No pull_request CI workflow run yet; waiting..."
              sleep 15
              continue
            fi
            status=$(printf '%s' "$run" | jq -r '.[0].status')
            conclusion=$(printf '%s' "$run" | jq -r '.[0].conclusion')
            echo "CI (pull_request): status=${status} conclusion=${conclusion}"
            if [ "$status" = "completed" ]; then
              case "$conclusion" in
                success)
                  echo "ci_ok=true" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                failure|cancelled|timed_out|action_required|startup_failure|stale|skipped|neutral)
                  echo "pull_request CI did not pass; skipping Prevue review."
                  echo "ci_ok=false" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
                *)
                  echo "Unknown CI conclusion '${conclusion}'; skipping Prevue review."
                  echo "ci_ok=false" >> "$GITHUB_OUTPUT"
                  exit 0
                  ;;
              esac
            else
              sleep 15
            fi
          done
          echo "Timed out waiting for pull_request CI; skipping Prevue review." >&2
          echo "ci_ok=false" >> "$GITHUB_OUTPUT"

  review:
    needs: wait-ci
    if: >-
      needs.wait-ci.outputs.ci_ok == 'true' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.draft != true
    # LIFE-04 resolveReviewThread needs contents:write — see prevue-review.yml.
    permissions:
      contents: write
      pull-requests: write
      checks: write
    uses: ./.github/workflows/prevue-review.yml
    with:
      engine: ${{ vars.PREVUE_ENGINE || 'copilot-cli' }}
      prevue-ref: ${{ github.event.pull_request.head.sha }}
      pr-head-sha: ${{ github.event.pull_request.head.sha }}
      consumer-base-sha: ${{ github.event.pull_request.base.sha }}
      seed-consumer-config: true
    secrets:
      copilot-github-token: ${{ secrets.COPILOT_GITHUB_TOKEN }}
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
      cursor-api-key: ${{ secrets.CURSOR_API_KEY }}
