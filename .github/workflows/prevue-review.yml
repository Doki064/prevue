name: Prevue Review (Reusable)

on:
  workflow_call:
    inputs:
      engine:
        type: string
        required: false
        default: copilot-cli
      config-path:
        type: string
        required: false
        default: .github/prevue.yml
      prevue-ref:
        type: string
        required: false
        default: ""
      pr-head-sha:
        type: string
        required: false
        default: ""
      consumer-base-sha:
        type: string
        required: false
        default: ""
      seed-consumer-config:
        type: boolean
        required: false
        default: false
    secrets:
      copilot-github-token:
        required: false
      anthropic-api-key:
        required: false
      cursor-api-key:
        required: false

# LIFE-04 (resolveReviewThread) requires contents:write — verified live 2026-06 (08-07).
# pull-requests:write alone returns GraphQL 403 Forbidden on resolveReviewThread.
# Prevue uses write scope for GraphQL lifecycle only, not for repo commits.
permissions:
  contents: write
  pull-requests: write
  checks: write

jobs:
  review:
    # Skip drafts; and forks (v1 does not review fork PRs — defense-in-depth so a
    # caller that omits its own fork guard still avoids checkout/uv/CLI spend before
    # the Python guard fires).
    if: >-
      ${{
        (inputs.pr-head-sha != '' && inputs.consumer-base-sha != '')
        || (
          github.event.pull_request
          && !github.event.pull_request.draft
          && github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Prevue framework
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          repository: Doki064/prevue
          ref: ${{ inputs.prevue-ref != '' && inputs.prevue-ref || 'v0.6.0' }}
          path: .prevue
          persist-credentials: false

      - name: Checkout consumer base ref
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.consumer-base-sha != '' && inputs.consumer-base-sha || github.event.pull_request.base.sha }}
          path: consumer
          persist-credentials: false

      - name: Seed consumer config from framework (dogfood)
        if: inputs.seed-consumer-config
        run: |
          if [ ! -f consumer/.github/prevue.yml ] && [ -f .prevue/.github/prevue.yml ]; then
            mkdir -p consumer/.github
            cp .prevue/.github/prevue.yml consumer/.github/prevue.yml
          fi

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "0.11.21"

      - name: Install dependencies
        working-directory: .prevue
        run: uv sync --locked

      - name: Pre-flight noop check
        id: preflight
        working-directory: .prevue
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PR_HEAD_SHA: ${{ inputs.pr-head-sha != '' && inputs.pr-head-sha || github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # Fetch existing Prevue sticky comment and extract head SHA.
          STICKY_SHA=""
          COMMENT_BODY=$(gh api \
            --paginate \
            "repos/$REPO/issues/$PR_NUMBER/comments?per_page=100" \
            --jq '[.[] | select(.user.login | test("^github-actions(\\[bot\\])?$")) | select(.body | test("^\\s*<!--\\s*prevue:sticky"))] | last | .body // empty' \
            2>/dev/null || true)
          if [ -n "$COMMENT_BODY" ]; then
            STICKY_SHA=$(printf '%s' "$COMMENT_BODY" | \
              sed -nE 's/.*<!--[[:space:]]*prevue:sticky[[:space:]]+head=([0-9a-f]{7,40})[[:space:]]*-->.*/\1/p' \
              | head -1 || true)
          fi
          export STICKY_SHA
          NOOP=$(uv run prevue preflight)
          echo "noop=$NOOP" >> "$GITHUB_OUTPUT"
          if [ "$NOOP" = "true" ]; then
            echo "Pre-flight: same-SHA noop (prevue preflight) — skipping engine CLI install"
          else
            echo "Pre-flight: head changed or no marker (sticky=$STICKY_SHA pr=$PR_HEAD_SHA) — full install"
          fi

      - name: Install engine CLI
        if: steps.preflight.outputs.noop != 'true'
        env:
          PREVUE_ENGINE: ${{ inputs.engine }}
        run: |
          case "$PREVUE_ENGINE" in
            copilot-cli)
              npm install -g @github/copilot@1.0.61
              command -v copilot
              ;;
            claude-code-cli)
              npm install -g @anthropic-ai/claude-code@2.1.177
              command -v claude
              ;;
            cursor-cli)
              # Official Cursor CLI installer (https://cursor.com/docs/cli/overview).
              # No versioned npm package — npm `cursor-agent` is an unrelated impostor;
              # supply-chain guard: test_cursor_install_uses_official_curl_installer_in_reusable.
              # Residual risk (no upstream pin/checksum): docs/consumer-setup.md.
              curl -fsS https://cursor.com/install -o "$RUNNER_TEMP/cursor-install.sh"
              bash "$RUNNER_TEMP/cursor-install.sh"
              command -v cursor-agent
              ;;
            *)
              echo "Unsupported engine: $PREVUE_ENGINE" >&2
              exit 1
              ;;
          esac

      - name: Run review
        working-directory: .prevue
        run: uv run prevue review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PREVUE_ENGINE: ${{ inputs.engine }}
          PREVUE_CONSUMER_ROOT: ${{ github.workspace }}/consumer
          PREVUE_CONFIG_PATH: ${{ inputs.config-path }}
          COPILOT_GITHUB_TOKEN: ${{ inputs.engine == 'copilot-cli' && secrets.copilot-github-token || '' }}
          ANTHROPIC_API_KEY: ${{ inputs.engine == 'claude-code-cli' && secrets.anthropic-api-key || '' }}
          CURSOR_API_KEY: ${{ inputs.engine == 'cursor-cli' && secrets.cursor-api-key || '' }}
