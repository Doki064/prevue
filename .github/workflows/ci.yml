name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "0.11.21"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest --cov=prevue -q

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Lint workflow files
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          ACTIONLINT="$(go env GOPATH)/bin/actionlint"
          "$ACTIONLINT" -color -shellcheck= -pyflakes= \
            .github/workflows/ci.yml \
            .github/workflows/review.yml \
            .github/workflows/prevue-review.yml \
            .github/workflows/prevue-command.yml

      - name: Scan workflows with zizmor
        uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
        with:
          advanced-security: false
          inputs: |
            .github/workflows
