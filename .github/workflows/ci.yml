name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          version: "0.11.21"

      - name: Install dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest --cov=prevue -q

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Install actionlint
        id: actionlint
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "executable=$(go env GOPATH)/bin/actionlint" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Lint workflow files
        run: ${{ steps.actionlint.outputs.executable }} -color -shellcheck= -pyflakes=
        shell: bash

      - name: Scan workflows with zizmor
        uses: zizmorcore/zizmor-action@v0.5.3
        with:
          advanced-security: false
          inputs: |
            .github/workflows
